<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <title>GreenLight V3 — Three Worlds</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: #0A0A0C;
            color: #fff;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .popover {
            position: relative;
            width: 380px;
            background: rgba(20, 20, 22, 0.9);
            backdrop-filter: blur(40px);
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 20px;
            box-shadow: 0 40px 120px rgba(0, 0, 0, 0.6);
            overflow: hidden;
        }

        /* Header */
        .logo {
            text-align: center;
            margin-bottom: 24px;
        }

        .logo-text {
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.25);
        }

        /* Three columns layout */
        .three-worlds {
            display: flex;
            gap: 8px;
            margin-bottom: 8px;
        }

        .world {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 14px;
            padding: 16px 8px 20px;
            border-radius: 18px;
            position: relative;
            overflow: hidden;
            transition: all 0.3s;
        }

        /* BG glow per world */
        .world::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 120px;
            border-radius: 18px 18px 0 0;
            opacity: 0.12;
            z-index: 0;
            transition: opacity 0.3s;
        }

        .world:hover::before {
            opacity: 0.2;
        }

        .world.green {
            background: rgba(34, 197, 94, 0.04);
        }

        .world.green::before {
            background: radial-gradient(ellipse at center top, #22C55E, transparent 70%);
        }

        .world.red {
            background: rgba(239, 68, 68, 0.04);
        }

        .world.red::before {
            background: radial-gradient(ellipse at center top, #EF4444, transparent 70%);
        }

        .world.blue {
            background: rgba(59, 130, 246, 0.04);
        }

        .world.blue::before {
            background: radial-gradient(ellipse at center top, #3B82F6, transparent 70%);
        }

        /* The big orb */
        .orb {
            position: relative;
            z-index: 1;
            width: 56px;
            height: 56px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .orb .count {
            font-size: 20px;
            font-weight: 800;
            color: #fff;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.3);
        }

        .orb .label {
            position: absolute;
            bottom: -18px;
            font-size: 9px;
            font-weight: 600;
            letter-spacing: 1px;
            text-transform: uppercase;
            white-space: nowrap;
            opacity: 0.5;
        }

        .world.green .orb {
            background: radial-gradient(circle at 35% 30%, #86EFAC, #22C55E 55%, #15803D);
            box-shadow: 0 0 25px rgba(34, 197, 94, 0.4), 0 4px 12px rgba(0, 0, 0, 0.3);
        }

        .world.green .orb .label {
            color: #22C55E;
        }

        .world.red .orb {
            background: radial-gradient(circle at 35% 30%, #FCA5A5, #EF4444 55%, #B91C1C);
            box-shadow: 0 0 25px rgba(239, 68, 68, 0.4), 0 4px 12px rgba(0, 0, 0, 0.3);
        }

        .world.red .orb .label {
            color: #EF4444;
        }

        .world.blue .orb {
            background: radial-gradient(circle at 35% 30%, #93C5FD, #3B82F6 55%, #1D4ED8);
            box-shadow: 0 0 25px rgba(59, 130, 246, 0.4), 0 4px 12px rgba(0, 0, 0, 0.3);
        }

        .world.blue .orb .label {
            color: #3B82F6;
        }

        /* Pulse ring animation on red */
        .world.red .orb::after {
            content: '';
            position: absolute;
            inset: -6px;
            border-radius: 50%;
            border: 2px solid rgba(239, 68, 68, 0.3);
            animation: pulse 2s ease-out infinite;
        }

        @keyframes pulse {
            0% {
                transform: scale(1);
                opacity: 0.6;
            }

            100% {
                transform: scale(1.5);
                opacity: 0;
            }
        }

        /* Icon stack below the orb */
        .icon-stack {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            margin-top: 8px;
        }

        .app-dot {
            width: 40px;
            height: 40px;
            border-radius: 10px;
            cursor: pointer;
            position: relative;
            transition: transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1), box-shadow 0.2s;
        }

        .app-dot::after {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .app-dot:hover {
            transform: scale(1.2);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.4);
            z-index: 10;
        }

        .app-dot:active {
            transform: scale(0.9);
        }

        /* Tooltip */
        .app-dot .tip {
            position: absolute;
            left: calc(100% + 8px);
            top: 50%;
            transform: translateY(-50%);
            background: rgba(0, 0, 0, 0.9);
            color: #fff;
            font-size: 10px;
            font-weight: 500;
            padding: 4px 10px;
            border-radius: 8px;
            white-space: nowrap;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s;
            z-index: 20;
        }

        .app-dot:hover .tip {
            opacity: 1;
        }

        /* Color classes */
        .c1 {
            background: linear-gradient(135deg, #667EEA, #764BA2);
        }

        .c2 {
            background: linear-gradient(135deg, #F97316, #EF4444);
        }

        .c3 {
            background: linear-gradient(135deg, #06B6D4, #3B82F6);
        }

        .c4 {
            background: linear-gradient(135deg, #8B5CF6, #D946EF);
        }

        .c5 {
            background: linear-gradient(135deg, #10B981, #059669);
        }

        .c6 {
            background: linear-gradient(135deg, #F59E0B, #D97706);
        }

        .c7 {
            background: linear-gradient(135deg, #EC4899, #F43F5E);
        }

        .c8 {
            background: linear-gradient(135deg, #6366F1, #4F46E5);
        }

        /* Blue scanning animation */
        .world.blue .app-dot {
            animation: scanShimmer 2s ease-in-out infinite;
        }

        @keyframes scanShimmer {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.5;
            }
        }

        /* ===== Bubble ===== */
        .overlay {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 90;
        }

        .overlay.show {
            display: block;
        }

        .action-bubble {
            display: none;
            position: fixed;
            z-index: 100;
            background: rgba(30, 30, 32, 0.97);
            backdrop-filter: blur(30px);
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            padding: 16px;
            min-width: 200px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.6);
            animation: popIn 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .action-bubble.show {
            display: block;
        }

        @keyframes popIn {
            from {
                opacity: 0;
                transform: scale(0.85) translateY(6px);
            }

            to {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }

        .bub-head {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 12px;
            padding-bottom: 12px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
        }

        .bub-ic {
            width: 32px;
            height: 32px;
            border-radius: 8px;
            flex-shrink: 0;
        }

        .bub-nm {
            font-size: 13px;
            font-weight: 600;
        }

        .bub-pt {
            font-size: 9px;
            color: rgba(255, 255, 255, 0.3);
            margin-top: 2px;
        }

        .bub-btns {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .bub-btn {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 9px 12px;
            border-radius: 10px;
            border: none;
            cursor: pointer;
            font-size: 12px;
            font-weight: 500;
            font-family: 'Outfit', sans-serif;
            transition: all 0.15s;
        }

        .bub-btn.sec {
            background: rgba(255, 255, 255, 0.06);
            color: rgba(255, 255, 255, 0.8);
        }

        .bub-btn.sec:hover {
            background: rgba(255, 255, 255, 0.12);
        }

        .bub-btn.pri {
            background: #22C55E;
            color: #fff;
        }

        .bub-btn.pri:hover {
            background: #16A34A;
        }
    </style>
</head>

<body>

    <div class="popover">
        <div class="logo"><span class="logo-text">GreenLight</span></div>

        <div class="three-worlds">
            <!-- GREEN WORLD -->
            <div class="world green">
                <div class="orb">
                    <span class="count">7</span>
                    <span class="label">Cleared</span>
                </div>
                <div class="icon-stack">
                    <div class="app-dot c5" data-name="Sketch" data-path="/Applications/Sketch.app" data-s="green"><span
                            class="tip">Sketch</span></div>
                    <div class="app-dot c3" data-name="VS Code" data-path="/Applications/VS Code.app" data-s="green">
                        <span class="tip">VS Code</span></div>
                    <div class="app-dot c8" data-name="Figma" data-path="/Applications/Figma.app" data-s="green"><span
                            class="tip">Figma</span></div>
                    <div class="app-dot c6" data-name="Docker" data-path="/Applications/Docker.app" data-s="green"><span
                            class="tip">Docker</span></div>
                    <div class="app-dot c1" data-name="Raycast" data-path="/Applications/Raycast.app" data-s="green">
                        <span class="tip">Raycast</span></div>
                </div>
            </div>

            <!-- RED WORLD -->
            <div class="world red">
                <div class="orb">
                    <span class="count">2</span>
                    <span class="label">Blocked</span>
                </div>
                <div class="icon-stack">
                    <div class="app-dot c1" data-name="Antigravity" data-path="/Applications/Antigravity.app"
                        data-s="red"><span class="tip">Antigravity</span></div>
                    <div class="app-dot c2" data-name="DevProxy" data-path="/Applications/DevProxy.app" data-s="red">
                        <span class="tip">DevProxy</span></div>
                </div>
            </div>

            <!-- BLUE WORLD -->
            <div class="world blue">
                <div class="orb">
                    <span class="count">1</span>
                    <span class="label">Scanning</span>
                </div>
                <div class="icon-stack">
                    <div class="app-dot c7" data-name="CleanMyMac" data-path="/Applications/CleanMyMac.app"
                        data-s="blue"><span class="tip">CleanMyMac</span></div>
                </div>
            </div>
        </div>
    </div>

    <div class="overlay" id="ov"></div>
    <div class="action-bubble" id="ab">
        <div class="bub-head">
            <div class="bub-ic c1" id="abIc"></div>
            <div>
                <div class="bub-nm" id="abNm">App</div>
                <div class="bub-pt" id="abPt">/path</div>
            </div>
        </div>
        <div class="bub-btns" id="abBtns"></div>
    </div>

    <script>
        const ab = document.getElementById('ab'), ov = document.getElementById('ov');
        document.querySelectorAll('.app-dot').forEach(d => {
            d.addEventListener('click', e => {
                e.stopPropagation();
                document.getElementById('abNm').textContent = d.dataset.name;
                document.getElementById('abPt').textContent = d.dataset.path;
                const cls = d.className.match(/c\d/)?.[0] || 'c1';
                document.getElementById('abIc').className = 'bub-ic ' + cls;
                let h = '';
                if (d.dataset.s === 'red') {
                    h = '<button class="bub-btn sec" onclick="cl()">🔓 Unlock</button><button class="bub-btn pri" onclick="cl()">▶ Unlock + Open</button>';
                } else if (d.dataset.s === 'green') {
                    h = '<button class="bub-btn sec" onclick="cl()">ℹ️ Info</button><button class="bub-btn sec" onclick="cl()">🔒 Re-block</button>';
                } else {
                    h = '<button class="bub-btn sec" onclick="cl()">⏳ Scanning...</button>';
                }
                document.getElementById('abBtns').innerHTML = h;
                const r = d.getBoundingClientRect();
                ab.style.left = Math.min(r.right + 8, window.innerWidth - 220) + 'px';
                ab.style.top = r.top + 'px';
                ab.classList.add('show'); ov.classList.add('show');
            });
        });
        function cl() { ab.classList.remove('show'); ov.classList.remove('show'); }
        ov.addEventListener('click', cl);
    </script>
</body>

</html>
