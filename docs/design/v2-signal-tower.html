<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <title>GreenLight V2 — Signal Tower</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: #0D0D0F;
            color: #fff;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* === Ambient background === */
        body::before {
            content: '';
            position: fixed;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background:
                radial-gradient(ellipse at 30% 20%, rgba(52, 199, 89, 0.06) 0%, transparent 50%),
                radial-gradient(ellipse at 70% 50%, rgba(255, 59, 48, 0.04) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 80%, rgba(48, 176, 255, 0.05) 0%, transparent 50%);
            animation: ambientDrift 20s ease-in-out infinite alternate;
            z-index: 0;
        }

        @keyframes ambientDrift {
            0% {
                transform: translate(0, 0) scale(1);
            }

            100% {
                transform: translate(-3%, 2%) scale(1.05);
            }
        }

        /* === Popover container === */
        .popover {
            position: relative;
            z-index: 1;
            width: 360px;
            background: rgba(28, 28, 30, 0.85);
            backdrop-filter: blur(40px);
            -webkit-backdrop-filter: blur(40px);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            padding: 28px 24px;
            box-shadow: 0 40px 120px rgba(0, 0, 0, 0.5);
        }

        /* === Header === */
        .app-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 28px;
        }

        .app-name {
            font-size: 13px;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.4);
            letter-spacing: 3px;
            text-transform: uppercase;
        }

        .header-icons {
            display: flex;
            gap: 8px;
        }

        .header-icon {
            width: 28px;
            height: 28px;
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.06);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 13px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .header-icon:hover {
            background: rgba(255, 255, 255, 0.12);
        }

        /* === Traffic Light Section === */
        .traffic-section {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .lane {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        /* The big light */
        .light {
            width: 52px;
            height: 52px;
            border-radius: 50%;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            font-weight: 800;
            color: #fff;
            position: relative;
            cursor: default;
            transition: transform 0.3s;
        }

        .light::before {
            content: '';
            position: absolute;
            inset: -4px;
            border-radius: 50%;
            opacity: 0.3;
            z-index: -1;
        }

        .light.green {
            background: radial-gradient(circle at 35% 35%, #6EE7A0, #22C55E 60%, #16A34A);
            box-shadow: 0 0 30px rgba(34, 197, 94, 0.35), 0 0 60px rgba(34, 197, 94, 0.1);
        }

        .light.green::before {
            box-shadow: 0 0 20px rgba(34, 197, 94, 0.4);
        }

        .light.red {
            background: radial-gradient(circle at 35% 35%, #FCA5A5, #EF4444 60%, #DC2626);
            box-shadow: 0 0 30px rgba(239, 68, 68, 0.35), 0 0 60px rgba(239, 68, 68, 0.1);
        }

        .light.red::before {
            box-shadow: 0 0 20px rgba(239, 68, 68, 0.4);
        }

        .light.blue {
            background: radial-gradient(circle at 35% 35%, #93C5FD, #3B82F6 60%, #2563EB);
            box-shadow: 0 0 30px rgba(59, 130, 246, 0.35), 0 0 60px rgba(59, 130, 246, 0.1);
        }

        .light.blue::before {
            box-shadow: 0 0 20px rgba(59, 130, 246, 0.4);
        }

        .light:hover {
            transform: scale(1.08);
        }

        /* Light label (count) */
        .light-count {
            font-size: 18px;
            font-weight: 800;
        }

        /* App icons grid next to the light */
        .icons-area {
            flex: 1;
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            min-height: 52px;
            align-items: center;
        }

        .app-icon {
            width: 44px;
            height: 44px;
            border-radius: 11px;
            cursor: pointer;
            position: relative;
            transition: transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1), box-shadow 0.2s;
            overflow: hidden;
        }

        .app-icon::after {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 11px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            pointer-events: none;
        }

        .app-icon:hover {
            transform: scale(1.15) translateY(-3px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.4);
            z-index: 10;
        }

        .app-icon:active {
            transform: scale(0.95);
        }

        /* Tooltip / name label on hover */
        .app-icon .tooltip {
            position: absolute;
            bottom: -24px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.85);
            color: #fff;
            font-size: 10px;
            font-weight: 500;
            padding: 3px 8px;
            border-radius: 6px;
            white-space: nowrap;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s;
        }

        .app-icon:hover .tooltip {
            opacity: 1;
        }

        /* Sample gradients for app icons */
        .gi-1 {
            background: linear-gradient(135deg, #667EEA, #764BA2);
        }

        .gi-2 {
            background: linear-gradient(135deg, #F97316, #EF4444);
        }

        .gi-3 {
            background: linear-gradient(135deg, #06B6D4, #3B82F6);
        }

        .gi-4 {
            background: linear-gradient(135deg, #8B5CF6, #D946EF);
        }

        .gi-5 {
            background: linear-gradient(135deg, #10B981, #059669);
        }

        .gi-6 {
            background: linear-gradient(135deg, #F59E0B, #D97706);
        }

        .gi-7 {
            background: linear-gradient(135deg, #EC4899, #F43F5E);
        }

        .gi-8 {
            background: linear-gradient(135deg, #6366F1, #4F46E5);
        }

        .gi-9 {
            background: linear-gradient(135deg, #14B8A6, #0D9488);
        }

        /* Lane label */
        .lane-label {
            font-size: 10px;
            font-weight: 600;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            opacity: 0.35;
            margin-bottom: -12px;
            padding-left: 68px;
        }

        /* Empty state text */
        .empty-hint {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.2);
            font-style: italic;
        }

        /* === Action Bubble (click interaction) === */
        .action-bubble {
            display: none;
            position: fixed;
            z-index: 100;
            background: rgba(44, 44, 46, 0.95);
            backdrop-filter: blur(30px);
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 16px;
            min-width: 220px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
            animation: bubbleIn 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .action-bubble.show {
            display: block;
        }

        @keyframes bubbleIn {
            from {
                opacity: 0;
                transform: scale(0.8) translateY(8px);
            }

            to {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }

        .bubble-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 12px;
            padding-bottom: 12px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
        }

        .bubble-icon {
            width: 36px;
            height: 36px;
            border-radius: 9px;
        }

        .bubble-name {
            font-size: 14px;
            font-weight: 600;
        }

        .bubble-path {
            font-size: 10px;
            color: rgba(255, 255, 255, 0.35);
            margin-top: 2px;
        }

        .bubble-actions {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .bubble-btn {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 14px;
            border-radius: 10px;
            border: none;
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
            font-family: 'Inter', sans-serif;
            transition: all 0.15s;
        }

        .bubble-btn.secondary {
            background: rgba(255, 255, 255, 0.06);
            color: rgba(255, 255, 255, 0.8);
        }

        .bubble-btn.secondary:hover {
            background: rgba(255, 255, 255, 0.12);
        }

        .bubble-btn.primary {
            background: #22C55E;
            color: #fff;
        }

        .bubble-btn.primary:hover {
            background: #16A34A;
        }

        .bubble-btn.primary.danger {
            background: #EF4444;
        }

        .bubble-btn.primary.danger:hover {
            background: #DC2626;
        }

        /* Overlay */
        .overlay {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 99;
        }

        .overlay.show {
            display: block;
        }
    </style>
</head>

<body>

    <div class="popover">
        <div class="app-header">
            <span class="app-name">GreenLight</span>
            <div class="header-icons">
                <div class="header-icon">⚙</div>
            </div>
        </div>

        <div class="traffic-section">
            <!-- GREEN -->
            <div class="lane-label">Cleared</div>
            <div class="lane">
                <div class="light green"><span class="light-count">7</span></div>
                <div class="icons-area">
                    <div class="app-icon gi-5" data-name="Sketch" data-path="/Applications/Sketch.app"
                        data-status="green"><span class="tooltip">Sketch</span></div>
                    <div class="app-icon gi-3" data-name="VS Code" data-path="/Applications/VS Code.app"
                        data-status="green"><span class="tooltip">VS Code</span></div>
                    <div class="app-icon gi-8" data-name="Figma" data-path="/Applications/Figma.app"
                        data-status="green"><span class="tooltip">Figma</span></div>
                    <div class="app-icon gi-9" data-name="Docker" data-path="/Applications/Docker.app"
                        data-status="green"><span class="tooltip">Docker</span></div>
                    <div class="app-icon gi-6" data-name="Notion" data-path="/Applications/Notion.app"
                        data-status="green"><span class="tooltip">Notion</span></div>
                    <div class="app-icon gi-4" data-name="Arc" data-path="/Applications/Arc.app" data-status="green">
                        <span class="tooltip">Arc</span></div>
                    <div class="app-icon gi-1" data-name="Raycast" data-path="/Applications/Raycast.app"
                        data-status="green"><span class="tooltip">Raycast</span></div>
                </div>
            </div>

            <!-- RED -->
            <div class="lane-label">Blocked</div>
            <div class="lane">
                <div class="light red"><span class="light-count">2</span></div>
                <div class="icons-area">
                    <div class="app-icon gi-1" data-name="Antigravity Tools"
                        data-path="/Applications/Antigravity Tools.app" data-status="red"><span
                            class="tooltip">Antigravity Tools</span></div>
                    <div class="app-icon gi-2" data-name="DevProxy" data-path="/Applications/DevProxy.app"
                        data-status="red"><span class="tooltip">DevProxy</span></div>
                </div>
            </div>

            <!-- BLUE -->
            <div class="lane-label">Scanning</div>
            <div class="lane">
                <div class="light blue"><span class="light-count">1</span></div>
                <div class="icons-area">
                    <div class="app-icon gi-7" data-name="CleanMyMac" data-path="/Applications/CleanMyMac.app"
                        data-status="blue"><span class="tooltip">CleanMyMac</span></div>
                </div>
            </div>
        </div>
    </div>

    <div class="overlay" id="overlay"></div>
    <div class="action-bubble" id="bubble">
        <div class="bubble-header">
            <div class="bubble-icon gi-1" id="bubbleIcon"></div>
            <div>
                <div class="bubble-name" id="bubbleName">App Name</div>
                <div class="bubble-path" id="bubblePath">/path/to/app</div>
            </div>
        </div>
        <div class="bubble-actions" id="bubbleActions"></div>
    </div>

    <script>
        const bubble = document.getElementById('bubble');
        const overlay = document.getElementById('overlay');
        const bubbleIcon = document.getElementById('bubbleIcon');
        const bubbleName = document.getElementById('bubbleName');
        const bubblePath = document.getElementById('bubblePath');
        const bubbleActions = document.getElementById('bubbleActions');

        document.querySelectorAll('.app-icon').forEach(icon => {
            icon.addEventListener('click', (e) => {
                e.stopPropagation();
                const name = icon.dataset.name;
                const path = icon.dataset.path;
                const status = icon.dataset.status;
                const cls = icon.className.match(/gi-\d/)?.[0] || 'gi-1';

                bubbleName.textContent = name;
                bubblePath.textContent = path;
                bubbleIcon.className = 'bubble-icon ' + cls;

                let html = '';
                if (status === 'red') {
                    html = `
        <button class="bubble-btn secondary" onclick="closeBubble()">🔓 Unlock</button>
        <button class="bubble-btn primary" onclick="closeBubble()">▶ Unlock + Open</button>
      `;
                } else if (status === 'green') {
                    html = `
        <button class="bubble-btn secondary" onclick="closeBubble()">ℹ️ View Info</button>
        <button class="bubble-btn primary danger" onclick="closeBubble()">🔒 Re-block</button>
      `;
                } else {
                    html = `
        <button class="bubble-btn secondary" onclick="closeBubble()">⏳ Scanning...</button>
      `;
                }
                bubbleActions.innerHTML = html;

                const rect = icon.getBoundingClientRect();
                bubble.style.left = Math.min(rect.left, window.innerWidth - 240) + 'px';
                bubble.style.top = (rect.bottom + 10) + 'px';

                bubble.classList.add('show');
                overlay.classList.add('show');
            });
        });

        function closeBubble() {
            bubble.classList.remove('show');
            overlay.classList.remove('show');
        }
        overlay.addEventListener('click', closeBubble);
    </script>
</body>

</html>
